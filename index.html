<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Vendas</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  display: flex;
}

/* MAIN */
#main {
  flex: 1;
  padding: 15px;
}

/* TABELA RESPONSIVA */
.table-container {
  overflow-x: auto;
}

table {
  border-collapse: collapse;
  width: 100%;
  min-width: 600px;
}

th {
  background: #2563eb;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border: 1px solid #ddd;
}

tr:hover {
  background: #e0f2fe;
  cursor: pointer;
}

/* INPUTS */
input, select {
  padding: 8px;
  margin: 5px 0;
  width: 100%;
  max-width: 300px;
}

/* CARRINHO */
#cart {
  width: 300px;
  background: #1f2937;
  color: white;
  padding: 15px;
}

#cart ul {
  list-style: none;
  padding: 0;
  max-height: 200px;
  overflow-y: auto;
}

/* BOTÕES */
button {
  padding: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.btn-add { background: #16a34a; color: white; }
.btn-remove { background: #dc2626; color: white; }
.btn-final { background: #22c55e; width: 100%; margin-top: 10px; }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: white;
  padding: 20px;
  margin: 5% auto;
  width: 90%;
  max-width: 600px;
  border-radius: 10px;
}

/* MOBILE */
@media (max-width: 768px) {
  body {
    flex-direction: column;
  }

  #cart {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
  }

  #main {
    padding-bottom: 200px;
  }
}
</style>
</head>

<body>

<div id="main">
  <h2>Produtos</h2>

  <input type="text" id="search" placeholder="Buscar..." onkeyup="applyFilters()">
  <div id="filters"></div>

  <div class="table-container">
    <table id="table">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div id="cart">
  <h3>🛒 Carrinho</h3>
  <ul id="cartItems"></ul>
  <p>Total: R$ <span id="total">0</span></p>
  <button class="btn-final" onclick="openCheckout()">Finalizar Pedido</button>
</div>

<!-- MODAL PRODUTO -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <div id="modalDetails"></div>

    <br>
    Quantidade:
    <input type="number" id="qty" value="1" min="1">

    <br><br>
    <button class="btn-add" onclick="addToCart()">Adicionar</button>
    <button onclick="closeModal()">Cancelar</button>
  </div>
</div>

<!-- MODAL CHECKOUT -->
<div id="checkoutModal" class="modal">
  <div class="modal-content">
    <h2>Revisar Pedido</h2>

    <div class="table-container">
      <table id="checkoutTable">
        <thead>
          <tr>
            <th>Produto</th>
            <th>Preço</th>
            <th>Qtd</th>
            <th>Total</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <h3>Total: R$ <span id="checkoutTotal">0</span></h3>

    <button onclick="generatePDF()">Salvar como PDF</button>
    <button onclick="closeCheckout()">Fechar</button>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKdjpPXyQqrnfi3jnNYfeeWh-ARt-1aPxIdL4cm_uwwosoi-ImgURlTcweWAJpJKvJkmQpDXD-xbTc/pub?gid=1717273730&single=true&output=csv";

let data = [];
let headers = [];
let selectedProduct = null;
let cart = [];

/* LOAD */
function loadCSV() {
  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: res => {
      data = res.data;
      headers = Object.keys(data[0]);
      createFilters();
      renderTable(data);
    }
  });
}

/* FILTERS */
function createFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = "";

  headers.forEach(header => {
    const select = document.createElement('select');
    select.dataset.column = header;

    const values = [...new Set(data.map(r => r[header]))];

    select.innerHTML = `<option value="">${header}</option>` +
      values.map(v => `<option>${v}</option>`).join('');

    select.onchange = applyFilters;
    container.appendChild(select);
  });
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();

  let filtered = data.filter(row => {
    if (search && !Object.values(row).some(v =>
      String(v).toLowerCase().includes(search)
    )) return false;

    let valid = true;

    document.querySelectorAll('#filters select').forEach(select => {
      if (select.value && row[select.dataset.column] !== select.value) {
        valid = false;
      }
    });

    return valid;
  });

  renderTable(filtered);
}

/* TABLE */
function renderTable(rows) {
  const thead = document.querySelector('#table thead');
  const tbody = document.querySelector('#table tbody');

  thead.innerHTML = "";
  tbody.innerHTML = "";

  const trHead = document.createElement('tr');
  headers.forEach(h => trHead.innerHTML += `<th>${h}</th>`);
  thead.appendChild(trHead);

  rows.forEach(row => {
    const tr = document.createElement('tr');
    tr.onclick = () => openModal(row);

    headers.forEach(h => {
      const td = document.createElement('td');
      td.textContent = row[h];
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

/* MODAL */
function openModal(product) {
  selectedProduct = product;

  document.getElementById('modalTitle').textContent =
    product["produto"] || product["Produto"];

  let details = "";
  Object.keys(product).forEach(k => {
    details += `<b>${k}:</b> ${product[k]}<br>`;
  });

  document.getElementById('modalDetails').innerHTML = details;
  document.getElementById('modal').style.display = "block";
}

function closeModal() {
  document.getElementById('modal').style.display = "none";
}

/* CART */
function addToCart() {
  const qty = parseInt(document.getElementById('qty').value);

  const price = parseFloat(
    selectedProduct["Preço de Lista"] ||
    selectedProduct["preço"] ||
    selectedProduct["Preco"] || 0
  );

  cart.push({
    ...selectedProduct,
    nome: selectedProduct["produto"] || selectedProduct["Produto"],
    preco: price,
    qty: qty,
    total: qty * price
  });

  updateCart();
  closeModal();
}

function updateCart() {
  const ul = document.getElementById('cartItems');
  ul.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    total += item.total;
    const li = document.createElement('li');
    li.textContent = `${item.nome} x${item.qty} = R$ ${item.total.toFixed(2)}`;
    ul.appendChild(li);
  });

  document.getElementById('total').textContent = total.toFixed(2);
}

/* CHECKOUT */
function openCheckout() {
  const tbody = document.querySelector('#checkoutTable tbody');
  tbody.innerHTML = "";

  let total = 0;

  cart.forEach((item, index) => {
    total += item.total;

    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${item.nome}</td>
      <td>R$ ${item.preco.toFixed(2)}</td>
      <td><input type="number" value="${item.qty}" min="1" onchange="updateQty(${index}, this.value)"></td>
      <td>R$ ${item.total.toFixed(2)}</td>
      <td><button class="btn-remove" onclick="removeItem(${index})">Remover</button></td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById('checkoutTotal').textContent = total.toFixed(2);
  document.getElementById('checkoutModal').style.display = "block";
}

function closeCheckout() {
  document.getElementById('checkoutModal').style.display = "none";
}

function updateQty(index, qty) {
  cart[index].qty = parseInt(qty);
  cart[index].total = cart[index].qty * cart[index].preco;
  openCheckout();
  updateCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  openCheckout();
  updateCart();
}

/* PDF */
function generatePDF() {
  let html = "<h2>Pedido</h2><table border='1' cellpadding='8'><tr><th>Produto</th><th>Preço</th><th>Qtd</th><th>Total</th></tr>";

  let total = 0;

  cart.forEach(item => {
    total += item.total;
    html += `<tr>
      <td>${item.nome}</td>
      <td>R$ ${item.preco.toFixed(2)}</td>
      <td>${item.qty}</td>
      <td>R$ ${item.total.toFixed(2)}</td>
    </tr>`;
  });

  html += `<tr><td colspan="3"><b>Total</b></td><td><b>R$ ${total.toFixed(2)}</b></td></tr></table>`;

  const win = window.open("", "", "width=800,height=600");
  win.document.write(html);
  win.print();
}

/* INIT */
loadCSV();
</script>

</body>
</html>
