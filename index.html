<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Comercial de Lista de Preços</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">

    <header class="mb-8">
      <h1 class="text-3xl font-bold">Sistema Comercial de Lista de Preços</h1>
      <p class="text-gray-600">Leitura automática do Google Sheets + filtros comerciais</p>
    </header>

    <section class="bg-white rounded-2xl shadow p-5 mb-6">
      <h2 class="text-lg font-semibold mb-4">Parâmetros Financeiros</h2>
      <div class="grid md:grid-cols-4 gap-4">
        <input id="dolar" type="number" step="0.01" value="5.23" class="border rounded-xl p-3" placeholder="Dólar" />
        <input id="frete" type="number" step="0.01" value="200" class="border rounded-xl p-3" placeholder="Frete" />
        <input id="icms" type="number" step="0.01" value="0" class="border rounded-xl p-3" placeholder="ICMS %" />
        <button onclick="carregarDados()" class="bg-black text-white rounded-xl px-4 py-3">Atualizar Dados</button>
      </div>
    </section>

    <section class="bg-white rounded-2xl shadow p-5 mb-6">
      <h2 class="text-lg font-semibold mb-4">Filtros</h2>
      <div class="grid md:grid-cols-3 gap-4">
        <input id="filtroProduto" type="text" placeholder="Buscar produto" class="border rounded-xl p-3" />
        <input id="filtroCliente" type="text" placeholder="Buscar cliente" class="border rounded-xl p-3" />
        <select id="filtroVendedor" class="border rounded-xl p-3">
          <option value="">Todos vendedores</option>
          <option value="Adriano">Adriano</option>
        </select>
      </div>
    </section>

    <section class="bg-white rounded-2xl shadow overflow-hidden">
      <div class="p-4 border-b font-semibold">Resultados Q2 (BRL_Q2_2026)</div>
      <div class="overflow-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-gray-100">
            <tr>
              <th class="p-3 text-left">Produto</th>
              <th class="p-3 text-left">Cliente</th>
              <th class="p-3 text-left">Preço Lista</th>
              <th class="p-3 text-left">FOB R$</th>
              <th class="p-3 text-left">CIF R$</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>

  </div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRIEJGuI3yYLuWoeuAiUcnYSNZZ-GsDmqMXQ6NGuQXgvmblKPuXPTmoStsiiPRmDieeJh6YRcuSxX2j/pub?gid=2077995566&single=true&output=csv';

    let dados = [];

    async function carregarDados() {
      const response = await fetch(CSV_URL);
      const texto = await response.text();
      const linhas = texto.split('\n').slice(1);

      dados = linhas.map(linha => {
        const col = linha.split(',');
        return {
          lista: col[0] || '',
          produto: col[2] || '',
          cliente: col[1] || '',
          preco: parseFloat((col[5] || '0').replace(',', '.')) || 0
        };
      }).filter(item => item.lista.includes('BRL_Q2_2026'));

      renderTabela();
    }

    function renderTabela() {
      const body = document.getElementById('tableBody');
      const dolar = parseFloat(document.getElementById('dolar').value || 0);
      const frete = parseFloat(document.getElementById('frete').value || 0);
      const icms = parseFloat(document.getElementById('icms').value || 0) / 100;
      const filtroProduto = document.getElementById('filtroProduto').value.toLowerCase();
      const filtroCliente = document.getElementById('filtroCliente').value.toLowerCase();

      body.innerHTML = '';

      dados
        .filter(item => item.produto.toLowerCase().includes(filtroProduto))
        .filter(item => item.cliente.toLowerCase().includes(filtroCliente))
        .forEach(item => {
          const fob = item.preco * (1 + icms) * dolar;
          const cif = fob + frete;

          body.innerHTML += `
            <tr class="border-t">
              <td class="p-3">${item.produto}</td>
              <td class="p-3">${item.cliente}</td>
              <td class="p-3">${item.preco.toFixed(2)}</td>
              <td class="p-3">${fob.toFixed(2)}</td>
              <td class="p-3">${cif.toFixed(2)}</td>
            </tr>
          `;
        });
    }

    document.getElementById('filtroProduto').addEventListener('input', renderTabela);
    document.getElementById('filtroCliente').addEventListener('input', renderTabela);

    carregarDados();
  </script>
</body>
</html>
