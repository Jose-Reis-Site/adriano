<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Produtos</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }

.controls { margin-bottom: 10px; }

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: left;
}

th { background: #f2f2f2; }

input, select {
  padding: 6px;
  margin: 5px;
}

.selected {
  background-color: #dff0d8;
}
</style>
</head>

<body>

<h2>Produtos</h2>

<div class="controls">
  <input type="text" id="search" placeholder="Buscar..." onkeyup="applyFilters()">
  <input type="number" id="minPrice" placeholder="Preço mín" oninput="applyFilters()">
  <input type="number" id="maxPrice" placeholder="Preço máx" oninput="applyFilters()">
  <button onclick="sendWhatsApp()">Enviar Pedido</button>
</div>

<div id="filters"></div>

<table id="dataTable">
  <thead></thead>
  <tbody></tbody>
</table>

<p><b>Total selecionado: R$ <span id="total">0</span></b></p>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKdjpPXyQqrnfi3jnNYfeeWh-ARt-1aPxIdL4cm_uwwosoi-ImgURlTcweWAJpJKvJkmQpDXD-xbTc/pub?gid=1717273730&single=true&output=csv";

let data = [];
let headers = [];
let selected = [];

function loadCSV() {
  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: res => {
      data = res.data;
      headers = Object.keys(data[0]);
      createFilters();
      renderTable(data);
    }
  });
}

function createFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = "<h3>Filtros</h3>";

  headers.forEach(header => {
    if (header.toLowerCase().includes("preço")) return;

    const select = document.createElement('select');
    select.dataset.column = header;

    const values = [...new Set(data.map(r => r[header]))];

    select.innerHTML = `<option value="">Todos (${header})</option>` +
      values.map(v => `<option>${v}</option>`).join('');

    select.onchange = applyFilters;
    container.appendChild(select);
  });
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const min = parseFloat(document.getElementById('minPrice').value) || 0;
  const max = parseFloat(document.getElementById('maxPrice').value) || Infinity;

  let filtered = data.filter(row => {
    const price = parseFloat(row["preço"] || row["Preco"] || 0);

    if (price < min || price > max) return false;

    if (search && !Object.values(row).some(v =>
      String(v).toLowerCase().includes(search)
    )) return false;

    let valid = true;

    document.querySelectorAll('#filters select').forEach(select => {
      if (select.value && row[select.dataset.column] !== select.value) {
        valid = false;
      }
    });

    return valid;
  });

  renderTable(filtered);
}

function renderTable(rows) {
  const thead = document.querySelector('#dataTable thead');
  const tbody = document.querySelector('#dataTable tbody');

  thead.innerHTML = "";
  tbody.innerHTML = "";

  const trHead = document.createElement('tr');

  trHead.innerHTML = "<th>✔</th>" + headers.map(h => `<th>${h}</th>`).join('');
  thead.appendChild(trHead);

  rows.forEach(row => {
    const tr = document.createElement('tr');

    const isChecked = selected.includes(row);

    tr.className = isChecked ? "selected" : "";

    const checkbox = document.createElement('input');
    checkbox.type = "checkbox";
    checkbox.checked = isChecked;

    checkbox.onchange = () => toggleSelection(row);

    const tdCheck = document.createElement('td');
    tdCheck.appendChild(checkbox);
    tr.appendChild(tdCheck);

    headers.forEach(h => {
      const td = document.createElement('td');
      td.textContent = row[h];
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  updateTotal();
}

function toggleSelection(row) {
  if (selected.includes(row)) {
    selected = selected.filter(r => r !== row);
  } else {
    selected.push(row);
  }

  renderTable(data);
}

function updateTotal() {
  let total = 0;

  selected.forEach(item => {
    total += parseFloat(item["preço"] || item["Preco"] || 0);
  });

  document.getElementById('total').textContent = total.toFixed(2);
}

function sendWhatsApp() {
  let message = "Pedido:%0A";

  selected.forEach(item => {
    message += `- ${item["produto"] || "Produto"} (R$ ${item["preço"]})%0A`;
  });

  message += `%0ATotal: R$ ${document.getElementById('total').textContent}`;

  const phone = "5599999999999";
  window.open(`https://wa.me/${phone}?text=${message}`);
}

loadCSV();
</script>

</body>
</html>
