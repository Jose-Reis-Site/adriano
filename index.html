<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja Online</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; margin: 0; display: flex; }
#main { flex: 1; padding: 20px; }
#cart {
  width: 300px;
  background: #f7f7f7;
  padding: 15px;
  border-left: 1px solid #ccc;
}
.card {
  border: 1px solid #ccc;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  width: 200px;
}
.grid {
  display: flex;
  flex-wrap: wrap;
}
button { padding: 5px 10px; margin-top: 5px; }
input, select { margin: 5px; padding: 5px; }
</style>
</head>

<body>

<div id="main">
  <h2>Produtos</h2>

  <input type="text" id="search" placeholder="Buscar..." onkeyup="applyFilters()">
  <input type="number" id="minPrice" placeholder="Preço mínimo" oninput="applyFilters()">
  <input type="number" id="maxPrice" placeholder="Preço máximo" oninput="applyFilters()">

  <div id="filters"></div>
  <div class="grid" id="productGrid"></div>
</div>

<div id="cart">
  <h3>Carrinho</h3>
  <ul id="cartItems"></ul>
  <p><b>Total: R$ <span id="total">0</span></b></p>
  <button onclick="sendWhatsApp()">Finalizar no WhatsApp</button>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKdjpPXyQqrnfi3jnNYfeeWh-ARt-1aPxIdL4cm_uwwosoi-ImgURlTcweWAJpJKvJkmQpDXD-xbTc/pub?gid=1717273730&single=true&output=csv";

let data = [];
let filteredData = [];
let cart = [];

function loadCSV() {
  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: res => {
      data = res.data;
      filteredData = data;
      createFilters();
      renderProducts();
    }
  });
}

function createFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = "";

  const headers = Object.keys(data[0]);

  headers.forEach(header => {
    if (header.toLowerCase().includes("preço")) return;

    const select = document.createElement('select');
    select.dataset.column = header;

    const values = [...new Set(data.map(r => r[header]))];

    select.innerHTML = `<option value="">Todos (${header})</option>` +
      values.map(v => `<option>${v}</option>`).join('');

    select.onchange = applyFilters;
    container.appendChild(select);
  });
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const min = parseFloat(document.getElementById('minPrice').value) || 0;
  const max = parseFloat(document.getElementById('maxPrice').value) || Infinity;

  filteredData = data.filter(row => {
    const price = parseFloat(row["preço"] || row["Preco"] || 0);

    if (price < min || price > max) return false;

    if (search && !Object.values(row).some(v =>
      String(v).toLowerCase().includes(search)
    )) return false;

    let valid = true;

    document.querySelectorAll('#filters select').forEach(select => {
      if (select.value && row[select.dataset.column] !== select.value) {
        valid = false;
      }
    });

    return valid;
  });

  renderProducts();
}

function renderProducts() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = "";

  filteredData.forEach(item => {
    const price = item["preço"] || item["Preco"] || "0";

    const div = document.createElement('div');
    div.className = "card";

    div.innerHTML = `
      <b>${item["produto"] || item["Produto"] || "Produto"}</b><br>
      R$ ${price}<br>
      <button onclick='addToCart(${JSON.stringify(item)})'>Adicionar</button>
    `;

    grid.appendChild(div);
  });
}

function addToCart(item) {
  cart.push(item);
  updateCart();
}

function updateCart() {
  const ul = document.getElementById('cartItems');
  ul.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    const price = parseFloat(item["preço"] || item["Preco"] || 0);
    total += price;

    const li = document.createElement('li');
    li.textContent = `${item["produto"] || "Produto"} - R$ ${price}`;
    ul.appendChild(li);
  });

  document.getElementById('total').textContent = total.toFixed(2);
}

function sendWhatsApp() {
  let message = "Pedido:%0A";

  cart.forEach(item => {
    message += `- ${item["produto"]} (R$ ${item["preço"]})%0A`;
  });

  message += `%0ATotal: R$ ${document.getElementById('total').textContent}`;

  const phone = "5599999999999"; // <-- COLOQUE SEU NÚMERO
  window.open(`https://wa.me/${phone}?text=${message}`);
}

loadCSV();
</script>

</body>
</html>
