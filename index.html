<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Vendas</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  display: flex;
}

/* LADO ESQUERDO */
#main {
  flex: 1;
  padding: 20px;
}

/* CARRINHO */
#cart {
  width: 300px;
  background: #1f2937;
  color: white;
  padding: 15px;
}

#cart h3 {
  margin-top: 0;
}

#cart ul {
  list-style: none;
  padding: 0;
}

#cart li {
  margin-bottom: 8px;
}

/* TABELA */
table {
  border-collapse: collapse;
  width: 100%;
}

th {
  background: #2563eb;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border: 1px solid #ddd;
}

tr:hover {
  background: #e0f2fe;
  cursor: pointer;
}

/* FILTROS */
input, select {
  padding: 6px;
  margin: 5px;
}

/* BOTÕES */
button {
  padding: 6px 10px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

.btn-add {
  background: #16a34a;
  color: white;
}

.btn-send {
  background: #22c55e;
  width: 100%;
  margin-top: 10px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  padding: 20px;
  margin: 5% auto;
  width: 350px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="main">
  <h2>Produtos</h2>

  <input type="text" id="search" placeholder="Buscar..." onkeyup="applyFilters()">
  <div id="filters"></div>

  <table id="table">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<div id="cart">
  <h3>🛒 Carrinho</h3>
  <ul id="cartItems"></ul>
  <p>Total: R$ <span id="total">0</span></p>
  <button class="btn-send" onclick="sendWhatsApp()">Finalizar</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <div id="modalDetails"></div>

    <br>
    Quantidade:
    <input type="number" id="qty" value="1" min="1">

    <br><br>
    <button class="btn-add" onclick="addToCart()">Adicionar ao Carrinho</button>
    <button onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKdjpPXyQqrnfi3jnNYfeeWh-ARt-1aPxIdL4cm_uwwosoi-ImgURlTcweWAJpJKvJkmQpDXD-xbTc/pub?gid=1717273730&single=true&output=csv";

let data = [];
let headers = [];
let selectedProduct = null;
let cart = [];

function loadCSV() {
  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: res => {
      data = res.data;
      headers = Object.keys(data[0]);
      createFilters();
      renderTable(data);
    }
  });
}

function createFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = "";

  headers.forEach(header => {
    const select = document.createElement('select');
    select.dataset.column = header;

    const values = [...new Set(data.map(r => r[header]))];

    select.innerHTML = `<option value="">${header}</option>` +
      values.map(v => `<option>${v}</option>`).join('');

    select.onchange = applyFilters;
    container.appendChild(select);
  });
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();

  let filtered = data.filter(row => {
    if (search && !Object.values(row).some(v =>
      String(v).toLowerCase().includes(search)
    )) return false;

    let valid = true;

    document.querySelectorAll('#filters select').forEach(select => {
      if (select.value && row[select.dataset.column] !== select.value) {
        valid = false;
      }
    });

    return valid;
  });

  renderTable(filtered);
}

function renderTable(rows) {
  const thead = document.querySelector('#table thead');
  const tbody = document.querySelector('#table tbody');

  thead.innerHTML = "";
  tbody.innerHTML = "";

  const trHead = document.createElement('tr');
  headers.forEach(h => trHead.innerHTML += `<th>${h}</th>`);
  thead.appendChild(trHead);

  rows.forEach(row => {
    const tr = document.createElement('tr');
    tr.onclick = () => openModal(row);

    headers.forEach(h => {
      const td = document.createElement('td');
      td.textContent = row[h];
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

function openModal(product) {
  selectedProduct = product;

  document.getElementById('modalTitle').textContent =
    product["produto"] || product["Produto"];

  let details = "";
  Object.keys(product).forEach(k => {
    details += `<b>${k}:</b> ${product[k]}<br>`;
  });

  document.getElementById('modalDetails').innerHTML = details;
  document.getElementById('qty').value = 1;

  document.getElementById('modal').style.display = "block";
}

function closeModal() {
  document.getElementById('modal').style.display = "none";
}

function addToCart() {
  const qty = parseInt(document.getElementById('qty').value);
  const price = parseFloat(selectedProduct["preço"] || selectedProduct["Preco"] || 0);

  cart.push({
    ...selectedProduct,
    qty: qty,
    total: qty * price
  });

  updateCart();
  closeModal();
}

function updateCart() {
  const ul = document.getElementById('cartItems');
  ul.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    total += item.total;

    const li = document.createElement('li');
    li.textContent = `${item.produto || "Produto"} x${item.qty} - R$ ${item.total}`;
    ul.appendChild(li);
  });

  document.getElementById('total').textContent = total.toFixed(2);
}

function sendWhatsApp() {
  let msg = "Pedido:%0A";

  cart.forEach(item => {
    msg += `- ${item.produto} x${item.qty} (R$ ${item.total})%0A`;
  });

  msg += `%0ATotal: R$ ${document.getElementById('total').textContent}`;

  const phone = "5599999999999";
  window.open(`https://wa.me/${phone}?text=${msg}`);
}

loadCSV();
</script>

</body>
</html>
