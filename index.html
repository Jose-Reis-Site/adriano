<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Venda de Produtos</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }

table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
}

th { background: #eee; }

tr:hover {
  background: #f5f5f5;
  cursor: pointer;
}

input, select {
  margin: 5px;
  padding: 5px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  padding: 20px;
  margin: 10% auto;
  width: 300px;
  border-radius: 10px;
}

button {
  padding: 6px 10px;
}
</style>
</head>

<body>

<h2>Produtos</h2>

<input type="text" id="search" placeholder="Buscar..." onkeyup="applyFilters()">

<div id="filters"></div>

<table id="table">
  <thead></thead>
  <tbody></tbody>
</table>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="productName"></h3>
    <p>Preço: R$ <span id="productPrice"></span></p>

    <label>Quantidade:</label>
    <input type="number" id="qty" value="1" min="1">

    <br><br>
    <button onclick="confirmSale()">Confirmar Venda</button>
    <button onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKdjpPXyQqrnfi3jnNYfeeWh-ARt-1aPxIdL4cm_uwwosoi-ImgURlTcweWAJpJKvJkmQpDXD-xbTc/pub?gid=1717273730&single=true&output=csv";

let data = [];
let headers = [];
let selectedProduct = null;

function loadCSV() {
  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: res => {
      data = res.data;
      headers = Object.keys(data[0]);
      createFilters();
      renderTable(data);
    }
  });
}

function createFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = "";

  headers.forEach(header => {
    if (header.toLowerCase().includes("preço")) return;

    const select = document.createElement('select');
    select.dataset.column = header;

    const values = [...new Set(data.map(r => r[header]))];

    select.innerHTML = `<option value="">Todos (${header})</option>` +
      values.map(v => `<option>${v}</option>`).join('');

    select.onchange = applyFilters;
    container.appendChild(select);
  });
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();

  let filtered = data.filter(row => {
    if (search && !Object.values(row).some(v =>
      String(v).toLowerCase().includes(search)
    )) return false;

    let valid = true;

    document.querySelectorAll('#filters select').forEach(select => {
      if (select.value && row[select.dataset.column] !== select.value) {
        valid = false;
      }
    });

    return valid;
  });

  renderTable(filtered);
}

function renderTable(rows) {
  const thead = document.querySelector('#table thead');
  const tbody = document.querySelector('#table tbody');

  thead.innerHTML = "";
  tbody.innerHTML = "";

  const trHead = document.createElement('tr');
  headers.forEach(h => {
    trHead.innerHTML += `<th>${h}</th>`;
  });
  thead.appendChild(trHead);

  rows.forEach(row => {
    const tr = document.createElement('tr');

    tr.onclick = () => openModal(row);

    headers.forEach(h => {
      const td = document.createElement('td');
      td.textContent = row[h];
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

function openModal(product) {
  selectedProduct = product;

  document.getElementById('productName').textContent =
    product["produto"] || product["Produto"];

  document.getElementById('productPrice').textContent =
    product["preço"] || product["Preco"];

  document.getElementById('qty').value = 1;

  document.getElementById('modal').style.display = "block";
}

function closeModal() {
  document.getElementById('modal').style.display = "none";
}

function confirmSale() {
  const qty = document.getElementById('qty').value;
  const name = selectedProduct["produto"] || "Produto";
  const price = selectedProduct["preço"] || 0;

  const total = qty * price;

  const msg =
    `Pedido:%0A` +
    `${name}%0A` +
    `Qtd: ${qty}%0A` +
    `Total: R$ ${total}`;

  const phone = "5599999999999";

  window.open(`https://wa.me/${phone}?text=${msg}`);

  closeModal();
}

loadCSV();
</script>

</body>
</html>
