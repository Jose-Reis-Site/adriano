<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard de Produtos</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    h2 { margin-bottom: 10px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; }
    th { background: #f0f0f0; }
    select, input { margin: 5px; padding: 6px; }
  </style>
</head>
<body>

<h2>Produtos</h2>

<input type="text" id="search" placeholder="Buscar..." onkeyup="applyFilters()">

<div id="filters"></div>

<table id="dataTable">
  <thead></thead>
  <tbody></tbody>
</table>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKdjpPXyQqrnfi3jnNYfeeWh-ARt-1aPxIdL4cm_uwwosoi-ImgURlTcweWAJpJKvJkmQpDXD-xbTc/pub?gid=1717273730&single=true&output=csv";

let originalData = [];
let headers = [];

function loadCSV() {
  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      originalData = results.data;
      headers = Object.keys(originalData[0]);
      createFilters();
      renderTable(originalData);
    }
  });
}

function createFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = "<h3>Filtros</h3>";

  headers.forEach(header => {
    const select = document.createElement('select');
    select.dataset.column = header;

    const values = [...new Set(originalData.map(row => row[header]))];

    select.innerHTML = `<option value="">Todos (${header})</option>` +
      values.map(v => `<option value="${v}">${v}</option>`).join('');

    select.onchange = applyFilters;
    container.appendChild(select);
  });
}

function applyFilters() {
  let filtered = originalData;

  const search = document.getElementById('search').value.toLowerCase();

  document.querySelectorAll('#filters select').forEach(select => {
    const value = select.value;
    const column = select.dataset.column;

    if (value) {
      filtered = filtered.filter(row => row[column] === value);
    }
  });

  if (search) {
    filtered = filtered.filter(row =>
      Object.values(row).some(v =>
        String(v).toLowerCase().includes(search)
      )
    );
  }

  renderTable(filtered);
}

function renderTable(data) {
  const thead = document.querySelector('#dataTable thead');
  const tbody = document.querySelector('#dataTable tbody');

  thead.innerHTML = '';
  tbody.innerHTML = '';

  const trHead = document.createElement('tr');
  headers.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    trHead.appendChild(th);
  });
  thead.appendChild(trHead);

  data.forEach(row => {
    const tr = document.createElement('tr');
    headers.forEach(h => {
      const td = document.createElement('td');
      td.textContent = row[h];
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

loadCSV();
</script>

</body>
</html>
